name: Build eNote

# Baut die App auf nativen Runnern (kein Cross-Compile nötig):
# - Windows  -> portable eNote.exe (kein Installer)
# - macOS    -> .dmg (universal: Apple Silicon + Intel)
#
# Läuft NUR bei einem Tag v* (z.B. v1.0.1) oder manuell ("Run workflow").
# Der Tag-Build erstellt automatisch ein GitHub-Release mit .exe + .dmg.
# Normale Pushes auf main lösen KEINEN Build aus.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write # nötig, um Release-Assets anzuhängen
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            # Nur portable eNote.exe, keine Installer (NSIS/MSI).
            args: "--no-bundle"
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Rust einrichten
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust-Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Frontend-Abhängigkeiten installieren
        run: npm ci

      # Bei einem Tag v0.2.0 die Version 0.2.0 in package.json, tauri.conf.json
      # und Cargo.toml setzen — nur für diesen Build, wird nicht committet.
      - name: Version aus Tag setzen
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          echo "Setze Version $V"
          V="$V" node -e "const fs=require('fs');for(const p of ['package.json','src-tauri/tauri.conf.json']){const j=JSON.parse(fs.readFileSync(p));j.version=process.env.V;fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n')}"
          V="$V" node -e "const fs=require('fs');const p='src-tauri/Cargo.toml';fs.writeFileSync(p,fs.readFileSync(p,'utf8').replace(/^version = .*/m,'version = \"'+process.env.V+'\"'))"

      - name: Tauri-App bauen
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.args }}

      - name: Artefakte hochladen (portable .exe + .dmg)
        uses: actions/upload-artifact@v4
        with:
          name: enote-${{ matrix.platform }}
          if-no-files-found: warn
          path: |
            src-tauri/target/**/release/eNote.exe
            src-tauri/target/**/release/bundle/dmg/*.dmg

      - name: An GitHub-Release anhängen (nur bei Tag v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/**/release/eNote.exe
            src-tauri/target/**/release/bundle/dmg/*.dmg
