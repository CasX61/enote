name: Build eNote

# Baut die App auf nativen Runnern (kein Cross-Compile nötig):
# - Windows  -> .exe (NSIS) + .msi
# - macOS    -> .dmg (universal: Apple Silicon + Intel)
# Läuft bei Push auf main und manuell über "Run workflow".

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Rust einrichten
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust-Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Frontend-Abhängigkeiten installieren
        run: npm ci

      - name: Tauri-App bauen
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.args }}

      - name: Installer/Bundles als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: enote-${{ matrix.platform }}
          if-no-files-found: warn
          path: |
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.dmg
